services:
  mysql:
    image: mysql:8.4
    container_name: streaming_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: streaming
      MYSQL_ROOT_PASSWORD: streaming_secret
    ports:
      - "3307:3306"
    volumes:
      - streaming_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pstreaming_secret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  streaming_mysql_data:
